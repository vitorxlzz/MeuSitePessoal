<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="contato.css">

  <link rel="icon" type="image/png" href="images/Girassol.png">
  
</head>
<body>

  <main class="contato-container">

    <a href="index.html" class="voltar">← voltar</a>


    <section class="contato-esquerda">
      <h1>Contato</h1>
      <p class="subtitulo">FORMAS DE FALAR COMIGO</p>

      <form class="form-contato" id="formContato">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome">

        <label for="email">E-mail</label>
        <input type="email" id="email" name="email">

        <label for="mensagem">Mensagem</label>
        <textarea id="mensagem" name="mensagem" rows="5"></textarea>

        <input type="file">

        <button type="submit">Enviar</button>

        

        <p id="mensagem-enviada" class="mensagem-enviada">
Mensagem enviada com sucesso!
</p>
      </form>
    </section>

    <section class="contato-direita">
      <div class="contato-box">
        <h2>Redes sociais</h2>
        <ul>
          <li><a href="https://www.instagram.com/_vitorxlzz_/" target="_blank">Instagram</a></li>
          <li><a href="https://www.linkedin.com/in/vitor-fernandes-aa52b62a7/?isSelfProfile=true" target="_blank">LinkedIn</a></li>
          <li><a href="https://github.com/vitorxlzz" target="_blank">GitHub</a></li>
          <li><a>Email: vitorfernandesnonato@gmail.com</a></li>
          <li><a>Telefone: (21) 98831-7971</a></li>
        </ul>
      </div>

      
    </section>

  </main>

  <script>
const form = document.getElementById("formContato");
const mensagem = document.getElementById("mensagem-enviada");

form.addEventListener("submit", function(event){
event.preventDefault(); 
mensagem.style.display = "block";
});
</script>

</body>
</html>

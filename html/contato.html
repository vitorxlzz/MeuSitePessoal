<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contato</title>

  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/contato.css">
  <link rel="icon" type="image/png" href="../images/Girassol.png">
</head>
<body>

  <main class="contato-container">

    <a href="index.html" class="voltar">← voltar</a>

    <section class="contato-esquerda">
      <h1>Contato</h1>
      <p class="subtitulo">FORMAS DE FALAR COMIGO</p>

      <form class="form-contato" id="formContato">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" required>

        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" required>

        <label for="mensagem">Mensagem</label>
        <textarea id="mensagem" name="mensagem" rows="5" required></textarea>

        <input type="file" id="arquivo" name="arquivo">

        <button type="submit">Enviar</button>

        <p id="mensagem-enviada" class="mensagem-enviada" style="display: none;"></p>
      </form>
    </section>

    <section class="contato-direita">
      <div class="contato-box">
        <h2>Redes sociais</h2>
        <ul>
          <li><a href="https://www.instagram.com/_vitorxlzz_/" target="_blank">Instagram</a></li>
          <li><a href="https://www.linkedin.com/in/vitor-fernandes-aa52b62a7/?isSelfProfile=true" target="_blank">LinkedIn</a></li>
          <li><a href="https://github.com/vitorxlzz" target="_blank">GitHub</a></li>
          <li><a href="mailto:vitorfernandesnonato@gmail.com">Email: vitorfernandesnonato@gmail.com</a></li>
          <li><a href="tel:+5521988317971">Telefone: (21) 98831-7971</a></li>
        </ul>
      </div>
    </section>

  </main>

  <script>
    const form = document.getElementById("formContato");
    const mensagem = document.getElementById("mensagem-enviada");

    form.addEventListener("submit", async function(event) {
      event.preventDefault();

      const formData = new FormData(form);

      try {
        const resposta = await fetch("https://formspree.io/f/mlgpowyg", {
          method: "POST",
          body: formData,
          headers: {
            Accept: "application/json"
          }
        });

        if (resposta.ok) {
          mensagem.textContent = "Mensagem enviada com sucesso!";
          mensagem.style.display = "block";
          form.reset();
        } else {
          mensagem.textContent = "Erro ao enviar. Tente novamente.";
          mensagem.style.display = "block";
        }
      } catch (erro) {
        mensagem.textContent = "Erro de conexão. Tente novamente.";
        mensagem.style.display = "block";
      }
    });
  </script>

</body>
</html>
